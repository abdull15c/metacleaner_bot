version: 1
disable_existing_loggers: false
formatters:
  std:
    format: "%(asctime)s [%(levelname)-8s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: std
    stream: ext://sys.stdout
  bot_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: std
    filename: logs/bot.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
  worker_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: std
    filename: logs/worker.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: std
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf8
loggers:
  bot:     {level: INFO, handlers: [console, bot_file,    error_file], propagate: false}
  workers: {level: INFO, handlers: [console, worker_file, error_file], propagate: false}
  admin:   {level: INFO, handlers: [console, error_file],              propagate: false}
  core:    {level: INFO, handlers: [console, error_file],              propagate: false}
  aiogram: {level: WARNING, handlers: [console], propagate: false}
  celery:  {level: INFO,    handlers: [console], propagate: false}
  sqlalchemy.engine: {level: WARNING, handlers: [console], propagate: false}
root:
  level: WARNING
  handlers: [console, error_file]
