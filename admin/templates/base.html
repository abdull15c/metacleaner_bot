<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{% block title %}MetaCleaner Admin{% endblock %}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f12;--surf:#161a20;--brd:#252a33;--acc:#3b82f6;--grn:#10b981;--red:#ef4444;--warn:#f59e0b;--txt:#e2e8f0;--mut:#64748b;--mono:'JetBrains Mono','Courier New',monospace;--ui:'Inter',system-ui,sans-serif;--r:6px;--sw:220px}
body{font-family:var(--ui);background:var(--bg);color:var(--txt);display:flex;min-height:100vh;font-size:14px}
.sidebar{width:var(--sw);background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--brd);font-family:var(--mono);font-size:13px;font-weight:500;color:var(--acc)}
.logo span{color:var(--mut);font-weight:400}
.nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);color:var(--mut);text-decoration:none;font-size:13.5px;font-weight:500;transition:.15s}
.nav a:hover{background:var(--brd);color:var(--txt)}
.nav a.on{background:rgba(59,130,246,.15);color:var(--acc)}
.sf{padding:12px 8px;border-top:1px solid var(--brd)}
.sf a{display:block;padding:8px 12px;border-radius:var(--r);color:var(--mut);text-decoration:none;font-size:13px;transition:.15s}
.sf a:hover{color:var(--red)}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topbar{padding:14px 28px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:var(--surf);position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:600}
.topbar-user{font-size:12px;color:var(--mut);font-family:var(--mono)}
.content{padding:28px;flex:1}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:20px}
.ch{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:28px}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:18px 20px}
.sl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sv{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1}
.sv.a{color:var(--acc)}.sv.g{color:var(--grn)}.sv.r{color:var(--red)}.sv.w{color:var(--warn)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--brd)}
td{padding:11px 14px;border-bottom:1px solid var(--brd);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;font-family:var(--mono)}
.pending,.draft{background:rgba(245,158,11,.15);color:var(--warn)}
.processing,.downloading,.sending,.running{background:rgba(59,130,246,.15);color:var(--acc)}
.done{background:rgba(16,185,129,.15);color:var(--grn)}
.failed{background:rgba(239,68,68,.15);color:var(--red)}
.cancelled,.paused{background:rgba(100,116,139,.15);color:var(--mut)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;border:none;cursor:pointer;text-decoration:none;transition:.15s}
.btn:hover{opacity:.85}
.bp{background:var(--acc);color:#fff}.bg{background:var(--grn);color:#fff}
.br{background:var(--red);color:#fff}.bw{background:var(--warn);color:#000}
.bh{background:var(--brd);color:var(--txt)}.sm{padding:5px 10px;font-size:12px}
.fg{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input,textarea,select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-size:13px;outline:none;transition:.15s;font-family:var(--ui)}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:100px}
.alert-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--grn);padding:12px 16px;border-radius:var(--r);margin-bottom:20px;font-size:13px}
code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:var(--acc)}
.mut{color:var(--mut)}.mono{font-family:var(--mono);font-size:12px}
.fb{display:flex;justify-content:space-between;align-items:center}
.gap{gap:8px}.mb{margin-bottom:20px}
.stitle{font-size:18px;font-weight:600;margin-bottom:20px}
.pag{display:flex;gap:6px;margin-top:20px;align-items:center}
.pag a{padding:6px 12px;border-radius:var(--r);background:var(--brd);color:var(--txt);text-decoration:none;font-size:13px}
.pag a:hover{background:var(--acc);color:#fff}
.pag span{color:var(--mut);font-size:13px}
.wf{width:100%}
</style>
</head><body>
<aside class="sidebar">
  <div class="logo">MetaCleaner<span>/admin</span></div>
  <nav class="nav">
    <a href="/admin/dashboard" class="{% if active_page=='dashboard' %}on{% endif %}">◈ Dashboard</a>
    <a href="/admin/jobs"      class="{% if active_page=='jobs' %}on{% endif %}">⚙ Задачи</a>
    <a href="/admin/users"     class="{% if active_page=='users' %}on{% endif %}">◉ Пользователи</a>
    <a href="/admin/broadcasts"class="{% if active_page=='broadcasts' %}on{% endif %}">◎ Рассылки</a>
    <a href="/admin/sponsors"  class="{% if active_page=='sponsors' %}on{% endif %}">★ Спонсоры</a>
    <a href="/admin/errors"    class="{% if active_page=='errors' %}on{% endif %}">⚠ Ошибки</a>
    <a href="/admin/settings"  class="{% if active_page=='settings' %}on{% endif %}">◧ Настройки</a>
  </nav>
  <div class="sf"><a href="/admin/logout">↩ Выйти</a></div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">{% block page_title %}{% endblock %}</div>
    <div class="topbar-user">{{ admin.username }}</div>
  </div>
  <div class="content">{% block content %}{% endblock %}</div>
</main>
</body></html>
