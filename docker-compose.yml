# Инфраструктура для локальной разработки и продакшена (Postgres + Redis).
# Приложение (бот, Celery, uvicorn) запускайте на хосте или отдельными контейнерами — см. DEPLOY.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metacleaner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metacleaner}
      POSTGRES_DB: ${POSTGRES_DB:-metacleaner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metacleaner} -d ${POSTGRES_DB:-metacleaner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
