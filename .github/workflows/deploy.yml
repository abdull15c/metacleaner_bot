name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt --quiet
            pip install -U yt-dlp --quiet
            python -m alembic upgrade head
            sudo systemctl restart metacleaner-bot metacleaner-worker metacleaner-beat metacleaner-admin
            sleep 3
            systemctl is-active metacleaner-bot metacleaner-worker metacleaner-beat metacleaner-admin
