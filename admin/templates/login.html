<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"/>
<title>MetaCleaner — Вход</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0d0f12;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:360px;background:#161a20;border:1px solid #252a33;border-radius:8px;padding:40px 36px}
.logo{font-family:monospace;font-size:16px;font-weight:500;color:#3b82f6;margin-bottom:6px}
.sub{font-size:13px;color:#64748b;margin-bottom:32px}
label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
input{width:100%;padding:10px 14px;background:#0d0f12;border:1px solid #252a33;border-radius:6px;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:18px;transition:.15s}
input:focus{border-color:#3b82f6}
.btn{width:100%;padding:11px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:hover{opacity:.85}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:20px}
</style></head><body>
<div class="box">
  <div class="logo">MetaCleaner</div>
  <div class="sub">Панель администратора</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}"/>
    <div><label>Логин</label><input type="text" name="username" required autofocus/></div>
    <div><label>Пароль</label><input type="password" name="password" required/></div>
    <button type="submit" class="btn">Войти</button>
  </form>
</div></body></html>
